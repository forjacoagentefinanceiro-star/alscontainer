name: Relatório diário — Barragens & Rio

on:
  schedule:
    # 10h BRT = 13:00 UTC (Brasil é UTC-3, sem horário de verão desde 2019)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  relatorio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar deps
        run: npm install --no-save @supabase/supabase-js tsx

      - name: Enviar relatório diário
        run: npx tsx scripts/report-diario.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_BARRAGENS_CHAT_IDS: ${{ secrets.TELEGRAM_BARRAGENS_CHAT_IDS }}
          TELEGRAM_BARRA_CHAT_IDS: ${{ secrets.TELEGRAM_BARRA_CHAT_IDS }}

      - name: Avisar no Telegram se falhou
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="⚠️ Relatório diário — falha no envio $(date -u +'%d/%m %H:%M')Z. Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null
