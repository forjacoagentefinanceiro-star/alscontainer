name: Extrair indicadores do websag

# Roda diariamente e também sob demanda (botão "Run workflow")
on:
  schedule:
    # 06:00, 10:00, 12:00 e 17:00 BRT (UTC−3) = 09, 13, 15, 20 UTC
    - cron: "0 9,13,15,20 * * *"
  workflow_dispatch:
    inputs:
      teste_telegram:
        description: 'Enviar mensagem de teste no Telegram'
        type: boolean
        default: false

jobs:
  extrair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # 22+ tem WebSocket nativo (exigido pelo supabase-js)

      - name: Teste de Telegram (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.teste_telegram }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then echo "Telegram não configurado (faltam secrets)"; exit 1; fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d chat_id="${TG_CHAT}" --data-urlencode text="✅ Teste — alerta do BI ALS está funcionando ($(date -u +'%d/%m %H:%M')Z)." && echo "Mensagem de teste enviada"

      # O extrator é infra independente do app — instala só o que ele precisa,
      # sem mexer no package.json/lock do projeto Next.
      - name: Instalar deps do extrator
        run: npm install --no-save playwright tsx @supabase/supabase-js

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Rodar extrator (websag — indicadores)
        id: websag
        run: npx tsx scripts/extract-websag.ts
        env:
          WEBSAG_URL: ${{ secrets.WEBSAG_URL }}
          WEBSAG_LOGIN: ${{ secrets.WEBSAG_LOGIN }}
          WEBSAG_SENHA: ${{ secrets.WEBSAG_SENHA }}
          WEBSAG_CHAVE: ${{ secrets.WEBSAG_CHAVE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Rodar extrator (escala — faturamento)
        id: escala
        if: always()
        continue-on-error: true
        run: npx tsx scripts/extract-escala.ts
        env:
          ESCALA_LOGIN_URL: ${{ secrets.ESCALA_LOGIN_URL }}
          ESCALA_PAINEL_URL: ${{ secrets.ESCALA_PAINEL_URL }}
          ESCALA_LOGIN: ${{ secrets.ESCALA_LOGIN }}
          ESCALA_SENHA: ${{ secrets.ESCALA_SENHA }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Avisar no Telegram se falhou
        if: ${{ failure() || steps.websag.outcome == 'failure' || steps.escala.outcome == 'failure' }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then echo "Telegram não configurado — pulando"; exit 0; fi
          MSG="⚠️ BI ALS — falha na atualização $(date -u +'%d/%m %H:%M')Z. websag=${{ steps.websag.outcome }} | escala=${{ steps.escala.outcome }}. Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d chat_id="${TG_CHAT}" --data-urlencode text="$MSG" > /dev/null
