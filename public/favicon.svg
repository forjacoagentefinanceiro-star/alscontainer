<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo azul ALS sem bordas arredondadas (iOS aplica o arredondamento) -->
  <rect width="32" height="32" fill="#1B4F8A"/>

  <!-- Container: corpo -->
  <rect x="4" y="8" width="24" height="14" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>

  <!-- Container: divisórias verticais internas -->
  <line x1="12" y1="8" x2="12" y2="22" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="8" x2="20" y2="22" stroke="white" stroke-width="1.2" opacity="0.7"/>

  <!-- Container: linha horizontal central -->
  <line x1="4" y1="15" x2="28" y2="15" stroke="white" stroke-width="0.9" opacity="0.5"/>

  <!-- Container: apoios -->
  <rect x="7"  y="22" width="3" height="2" rx="0.5" fill="white" opacity="0.8"/>
  <rect x="22" y="22" width="3" height="2" rx="0.5" fill="white" opacity="0.8"/>

  <!-- Traço verde ALS -->
  <path d="M3 27 Q16 24 29 27" stroke="#7DC242" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
